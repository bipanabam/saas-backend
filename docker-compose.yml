services:
  app:
    image: saas-api:v1
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.compose
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    volumes:
      - .:/code:rw
    depends_on:
      - db
      - redis
  db:
    image: postgres:17
    container_name: saas_backend_db
    restart: always
    environment:
      POSTGRES_USER: backenduser
      POSTGRES_PASSWORD: backendpassword
      POSTGRES_DB: saas_backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: saas_backend_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: